apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-nexus-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/VaishnaviLatey21/Project-Nexus-IDP.git
    targetRevision: HEAD    # Use the latest commit of the default branch.
    path: gitops/addons

  # where to deploy resources
  destination:
    server: https://kubernetes.default.svc           
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true